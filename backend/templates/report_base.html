<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        /* ── Base ────────────────────────────────────────── */
        @page {
            size: A4;
            margin: 2cm 2.5cm;
            @top-right {
                content: "{{ classification }}";
                font-size: 9px;
                color: #6b7280;
                font-family: 'Helvetica Neue', Arial, sans-serif;
            }
            @bottom-center {
                content: "{{ footer_text }} — Página " counter(page) " de " counter(pages);
                font-size: 8px;
                color: #9ca3af;
                font-family: 'Helvetica Neue', Arial, sans-serif;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #1f2937;
            background: white;
        }

        /* ── Cover Section ────────────────────────────────── */
        .cover {
            text-align: center;
            padding: 4cm 0 2cm;
            border-bottom: 3px solid #6366f1;
            margin-bottom: 1.5cm;
            page-break-after: always;
        }

        .cover .logo {
            font-size: 36pt;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5cm;
        }

        .cover .title {
            font-size: 22pt;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5cm;
        }

        .cover .meta {
            font-size: 10pt;
            color: #6b7280;
            margin-top: 1cm;
        }

        .cover .meta div {
            margin-bottom: 4px;
        }

        .cover .classification-badge {
            display: inline-block;
            padding: 4px 16px;
            background: #fef3c7;
            color: #92400e;
            font-size: 9pt;
            font-weight: 600;
            border-radius: 4px;
            margin-top: 1cm;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── Content ──────────────────────────────────────── */
        .content {
            max-width: 100%;
        }

        h1 {
            font-size: 18pt;
            font-weight: 700;
            color: #1f2937;
            border-bottom: 2px solid #6366f1;
            padding-bottom: 6px;
            margin: 1.5em 0 0.5em;
        }

        h2 {
            font-size: 14pt;
            font-weight: 600;
            color: #374151;
            border-left: 4px solid #8b5cf6;
            padding-left: 10px;
            margin: 1.2em 0 0.4em;
        }

        h3 {
            font-size: 12pt;
            font-weight: 600;
            color: #4b5563;
            margin: 1em 0 0.3em;
        }

        p {
            margin-bottom: 0.6em;
            text-align: justify;
        }

        ul, ol {
            margin: 0.5em 0 0.5em 1.5em;
        }

        li {
            margin-bottom: 0.3em;
        }

        /* ── Tables ───────────────────────────────────────── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
            font-size: 9pt;
        }

        th {
            background: #6366f1;
            color: white;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 6px 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:nth-child(even) td {
            background: #f9fafb;
        }

        /* ── Code blocks ──────────────────────────────────── */
        code {
            font-family: 'Courier New', monospace;
            font-size: 9pt;
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
        }

        pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 12px;
            border-radius: 6px;
            font-size: 9pt;
            overflow-x: auto;
            margin: 0.8em 0;
        }

        pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        /* ── Severity badges ──────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 8pt;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-critical { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-high     { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .badge-medium   { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }
        .badge-low      { background: #f9fafb; color: #6b7280; border: 1px solid #e5e7eb; }

        /* ── Info boxes ───────────────────────────────────── */
        .info-box {
            padding: 12px 16px;
            border-radius: 6px;
            margin: 1em 0;
            font-size: 10pt;
        }

        .info-box.warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            color: #92400e;
        }

        .info-box.danger {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }

        .info-box.info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }

        .info-box.success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            color: #166534;
        }

        /* ── Metrics ──────────────────────────────────────── */
        .metric-grid {
            display: flex;
            gap: 12px;
            margin: 1em 0;
        }

        .metric-card {
            flex: 1;
            padding: 12px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            text-align: center;
        }

        .metric-card .value {
            font-size: 20pt;
            font-weight: 700;
            color: #6366f1;
        }

        .metric-card .label {
            font-size: 8pt;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <!-- Cover Page -->
    <div class="cover">
        <div class="logo">🛡 NetShield</div>
        <div class="title">{{ title }}</div>
        <div class="meta">
            <div><strong>Generado por:</strong> {{ author }}</div>
            <div><strong>Fecha:</strong> {{ date }}</div>
        </div>
        <div class="classification-badge">{{ classification }}</div>
    </div>

    <!-- Report Content -->
    <div class="content">
        {{ content | safe }}
    </div>
</body>
</html>
